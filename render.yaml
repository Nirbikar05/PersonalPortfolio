services:
  - type: web
    name: portfolio-api
    runtime: java
    plan: free
    rootDir: server
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/portfolio-api-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
